aid: google-pub-sub
name: Google Pub/Sub
description: >-
  Google Cloud Pub/Sub is a fully managed, real-time messaging service that
  allows you to send and receive messages between independent applications,
  providing reliable, many-to-many, asynchronous messaging for event
  ingestion, streaming analytics, and event-driven computing.
